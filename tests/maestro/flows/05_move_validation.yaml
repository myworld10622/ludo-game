appId: com.roxludo.roxludo
name: "Token Move Validation"
tags:
  - multiplayer
  - gameplay
  - move

---
- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      id: "btn_roll_dice"
    timeout: 20000

# Roll and try to move tokens repeatedly
- repeat:
    times: 10
    commands:
      - tapOn:
          id: "btn_roll_dice"
          optional: true
      - waitForAnimationToEnd:
          timeout: 3000
      - tapOn:
          id: "btn_move_token_0"
          optional: true
      - waitForAnimationToEnd:
          timeout: 3000

- takeScreenshot: "screenshots/05_token_moved"

- assertVisible:
    id: "panel_game_board"

- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: "screenshots/05_turn_advanced"
