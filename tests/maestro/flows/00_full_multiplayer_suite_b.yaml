appId: com.roxludo.roxludo
name: "Full Multiplayer Suite — Device B (Joiner)"
tags:
  - suite
  - multiplayer

---
# Master flow for Device B (Player B / joiner).
# Run simultaneously with 00_full_multiplayer_suite.yaml on Device A.
# PRIVATE_ROOM_CODE must be set after Device A creates the room.

- runFlow: flows/01_login.yaml
  env:
    PLAYER_MOBILE: "${PLAYER_B_MOBILE}"

- runFlow: flows/03_private_room_join.yaml
  env:
    PRIVATE_ROOM_CODE: "${PRIVATE_ROOM_CODE}"

- runFlow: flows/04_turn_and_dice_validation.yaml

- runFlow: flows/05_move_validation.yaml

- runFlow: flows/09_voice_chat_test.yaml

- runFlow: flows/11_stuck_turn_detection.yaml

- runFlow: flows/07_airplane_mode_test.yaml

- runFlow: flows/08_minimize_restore_test.yaml
