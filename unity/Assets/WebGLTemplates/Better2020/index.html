<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{{ PRODUCT_NAME }}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body class="{{{ SPLASH_SCREEN_STYLE.toLowerCase() }}}">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
    </div>

    <!-- Hidden file input container for the gallery -->
    <div id="fileInputContainer" style="display: none;">
      <input type="file" id="imageInput" accept="image/*" onchange="onImageSelected(event)">
    </div>

    <div id="loading-cover" style="display:none;">
      <div id="unity-loading-bar">
        <div id="unity-logo">
          <img src="logo-20260517.png">
        </div>
        <div id="unity-progress-bar-empty" style="display: none;">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div class="spinner"></div>
      </div>
    </div>
    <div id="unity-fullscreen-button" style="display: none;"></div>

    <script>
      const hideFullScreenButton = "{{{ HIDE_FULL_SCREEN_BUTTON }}}";
      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      const config = {
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#if MEMORY_FILENAME
        memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: "{{{ COMPANY_NAME }}}",
        productName: "{{{ PRODUCT_NAME }}}",
        productVersion: "{{{ PRODUCT_VERSION }}}",
      };

      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const unityContainer = document.querySelector("#unity-container");
      const loadingCover = document.querySelector("#loading-cover");
      const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const fullscreenButton = document.querySelector("#unity-fullscreen-button");
      const spinner = document.querySelector('.spinner');
      const logoImage = document.querySelector("#unity-logo img");

      window.setDesiredOrientation = function(mode) {
        try {
          const normalizedMode = mode === "landscape" ? "landscape" : "portrait";
          if (document.body && document.body.classList) {
            document.body.classList.remove("webgl-portrait", "webgl-landscape");
            document.body.classList.add(`webgl-${normalizedMode}`);
          }

          if (typeof screen !== "undefined" && screen.orientation && typeof screen.orientation.lock === "function") {
            const lockTarget = normalizedMode === "landscape" ? "landscape" : "portrait";
            const maybePromise = screen.orientation.lock(lockTarget);
            if (maybePromise && typeof maybePromise.catch === "function") {
              maybePromise.catch(() => {});
            }
          }
        } catch (error) {
          console.warn("setDesiredOrientation failed", error);
        }
      };

      window.CopyTextToClipboard = function(text) {
        const value = typeof text === "string" ? text : String(text ?? "");
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(value).catch(() => fallbackCopyText(value));
          return;
        }
        fallbackCopyText(value);
      };

      window.exitWebGlFullscreenIfActive = function() {
        const exitFullscreen =
          document.exitFullscreen ||
          document.webkitExitFullscreen ||
          document.webkitCancelFullScreen ||
          document.mozCancelFullScreen ||
          document.msExitFullscreen;

        if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement) {
          try {
            exitFullscreen && exitFullscreen.call(document);
          } catch (_) {}
        }
      };

      window.prepareWebGlTextInput = function(mode) {
        const normalized = mode === "numeric" ? "numeric" : "default";
        window.__roxWebGlInputMode = normalized;
        window.exitWebGlFullscreenIfActive();
        applyWebGlInputModeToDom(normalized);
      };

      window.RequestWebGLMicrophonePermission = function() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          return;
        }

        navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
          try {
            stream.getTracks().forEach((track) => track.stop());
          } catch (_) {}
        }).catch((error) => {
          console.warn("WebGL microphone permission request failed", error);
        });
      };

      function fallbackCopyText(value) {
        const textArea = document.createElement("textarea");
        textArea.value = value;
        textArea.setAttribute("readonly", "");
        textArea.style.position = "fixed";
        textArea.style.opacity = "0";
        textArea.style.pointerEvents = "none";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand("copy");
        } catch (e) {
          console.warn("Clipboard copy fallback failed", e);
        }
        document.body.removeChild(textArea);
      }

      function applyWebGlInputModeToDom(mode) {
        const isNumeric = mode === "numeric";
        const targets = Array.from(document.querySelectorAll("input, textarea"));
        targets.forEach((element) => {
          try {
            if (isNumeric) {
              element.setAttribute("inputmode", "numeric");
              element.setAttribute("pattern", "[0-9]*");
              if (element.tagName === "INPUT") {
                element.setAttribute("type", "tel");
              }
            } else {
              element.removeAttribute("inputmode");
              element.removeAttribute("pattern");
              if (element.tagName === "INPUT" && element.getAttribute("type") === "tel") {
                element.setAttribute("type", "text");
              }
            }
          } catch (_) {}
        });
      }

      function buildPrivateTableShareMessage(code) {
        return `Play Rox Ludo with me!\nRoom Code: ${code}\nPlay at roxludo.com`;
      }

      function tryHandlePrivateTableApi(url, responseText, method) {
        if (!url || !responseText) return;

        let payload = null;
        try {
          payload = JSON.parse(responseText);
        } catch (_) {
          return;
        }

        const normalizedUrl = String(url).toLowerCase();
        const normalizedMethod = String(method || "").toUpperCase();

        const isCreate = normalizedMethod === "POST" && normalizedUrl.includes("/api/v1/ludo/private-table/create");
        const isJoin = normalizedMethod === "POST" && normalizedUrl.includes("/api/v1/ludo/private-table/join");
        const isInfo =
          normalizedMethod === "GET" &&
          normalizedUrl.includes("/api/v1/ludo/private-table/") &&
          !normalizedUrl.includes("/create") &&
          !normalizedUrl.includes("/join") &&
          !normalizedUrl.includes("/leave") &&
          !normalizedUrl.includes("/start") &&
          !normalizedUrl.includes("/complete");

        if (isCreate && payload && payload.success && payload.data && payload.data.code) {
          const code = String(payload.data.code).trim();
          if (code && window.__roxLastCopiedShareCode !== code) {
            window.__roxLastCopiedShareCode = code;
            window.CopyTextToClipboard(buildPrivateTableShareMessage(code));
          }
        }

        if ((isJoin || isInfo) && payload && payload.success && payload.data) {
          window.__roxPendingLandscape = true;
          window.setDesiredOrientation("landscape");
        }
      }

      function installPrivateTableApiHooks() {
        if (window.__roxPrivateTableHooksInstalled) return;
        window.__roxPrivateTableHooksInstalled = true;

        if (window.fetch) {
          const originalFetch = window.fetch.bind(window);
          window.fetch = function(input, init) {
            const requestUrl = typeof input === "string" ? input : (input && input.url) || "";
            const requestMethod =
              (init && init.method) ||
              (typeof input !== "string" && input && input.method) ||
              "GET";

            return originalFetch(input, init).then((response) => {
              try {
                const cloned = response.clone();
                cloned.text().then((text) => {
                  tryHandlePrivateTableApi(requestUrl, text, requestMethod);
                }).catch(() => {});
              } catch (_) {}
              return response;
            });
          };
        }

        if (window.XMLHttpRequest) {
          const originalOpen = XMLHttpRequest.prototype.open;
          const originalSend = XMLHttpRequest.prototype.send;

          XMLHttpRequest.prototype.open = function(method, url) {
            this.__roxMethod = method;
            this.__roxUrl = url;
            return originalOpen.apply(this, arguments);
          };

          XMLHttpRequest.prototype.send = function() {
            this.addEventListener("load", function() {
              try {
                if (this.responseType && this.responseType !== "" && this.responseType !== "text") {
                  return;
                }
                tryHandlePrivateTableApi(this.__roxUrl, this.responseText, this.__roxMethod);
              } catch (_) {}
            });
            return originalSend.apply(this, arguments);
          };
        }
      }

      function applyMobileWebGlSizing() {
        const portrait = window.innerHeight >= window.innerWidth;
        const mobileLike = window.matchMedia("(hover: none) and (pointer: coarse)").matches || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const forceLandscape = document.body && document.body.classList && document.body.classList.contains("webgl-landscape");

        if (mobileLike && portrait && !forceLandscape) {
          unityContainer.style.width = "min(96vw, calc(96vh * 9 / 16))";
          unityContainer.style.height = "min(96vh, calc(96vw * 16 / 9))";
          unityContainer.style.aspectRatio = "9 / 16";
          if (logoImage) {
            logoImage.style.maxWidth = "68%";
            logoImage.style.maxHeight = "26vh";
          }
          progressBarEmpty.style.width = "78%";
          return;
        }

        if (mobileLike && forceLandscape) {
          unityContainer.style.width = "min(96vw, calc(96vh * 16 / 9))";
          unityContainer.style.height = "min(96vh, calc(96vw * 9 / 16))";
          unityContainer.style.aspectRatio = "16 / 9";
          if (logoImage) {
            logoImage.style.maxWidth = "62%";
            logoImage.style.maxHeight = "22vh";
          }
          progressBarEmpty.style.width = "74%";
          return;
        }

        unityContainer.style.removeProperty("width");
        unityContainer.style.removeProperty("height");
        unityContainer.style.removeProperty("aspect-ratio");
        if (logoImage) {
          logoImage.style.removeProperty("max-width");
          logoImage.style.removeProperty("max-height");
        }
        progressBarEmpty.style.removeProperty("width");
      }

      document.addEventListener("focusin", () => {
        if (window.__roxWebGlInputMode) {
          applyWebGlInputModeToDom(window.__roxWebGlInputMode);
        }
      });

      const canFullscreen = (function() {
        for (const key of [
            'exitFullscreen',
            'webkitExitFullscreen',
            'webkitCancelFullScreen',
            'mozCancelFullScreen',
            'msExitFullscreen',
          ]) {
          if (key in document) {
            return true;
          }
        }
        return false;
      }());

      // if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      //   container.className = "unity-mobile";
      //   config.devicePixelRatio = 1;
      // }
#if BACKGROUND_FILENAME
      canvas.style.background = "url('" + buildUrl + "/{{{ BACKGROUND_FILENAME.replace(/'/g, '%27') }}}') center / cover";
#endif
      window.setDesiredOrientation("portrait");
      applyMobileWebGlSizing();
      installPrivateTableApiHooks();
      window.addEventListener("resize", applyMobileWebGlSizing);
      loadingCover.style.display = "";

      let unityInstance = null;
      let unityInstanceReady = false;
      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          spinner.style.display = "none";
          progressBarEmpty.style.display = "";
          progressBarFull.style.width = `${100 * progress}%`;
        }).then((instance) => {
          unityInstance = instance;  // Store the unity instance
          unityInstanceReady = true;
          loadingCover.style.display = "none";
          if (canFullscreen) {
            if (!hideFullScreenButton) {
              fullscreenButton.style.display = "";
            }
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      // Gallery functionality for image selection
      function openGalleryWebGL(target) {
        console.log("openGalleryWebGL function called");
        window.currentTarget = target; // Save the target name for Unity
        document.getElementById('imageInput').click(); // Trigger the hidden file input
      }

      async function onImageSelected(event) {
        if (!unityInstanceReady) {
          console.error("Unity is not ready yet.");
          return;
        }

        const file = event.target.files[0];
        if (!file) {
            console.error("No file selected.");
            return;
        }

        // Read the file as a Base64 string
        const reader = new FileReader();
        reader.onload = function (e) {
            const base64String = e.target.result.split(',')[1]; // Extract Base64 part
            const target = window.currentTarget;

            console.log("Image selected:", target, base64String); // Log selected image data

            // Send the Base64 string to Unity via the unityInstance
            if (unityInstance && unityInstance.SendMessage) {
                console.log("Sending message to Unity...");
                console.log("Data being sent to Unity:", target + '|' + base64String);
                unityInstance.SendMessage('ImageManager', 'OnImageSelected', target + '|' + base64String);
            } else {
                console.error("Unity instance is not ready.");
            }
        };
        reader.readAsDataURL(file);
      }
    </script>
  </body>
</html>
